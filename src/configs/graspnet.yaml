# configs/graspnet.yaml
model:
  num_classes: 50      # 实际类别数量
  max_grasps: 10       # 最大预测抓取数

data:
  train_path: "../dataset/processed_data/train"
  val_path: "../dataset/processed_data/val"
#  train_path: "/home/user/wff/data/processed/train"
#  val_path: "/home/user/wff/data/processed/val"
  batch_size: 30
  num_workers: 4

optim:
  lr: 0.0001
  weight_decay: 0.000001

training:
  epochs: 250
  device: "cuda:0"
  log_dir: "logs/"
  save_dir: "checkpoints/"